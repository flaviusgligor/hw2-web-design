    <main id="main-content">
        <section>
            <h2>Lasa-mi un mesaj</h2>
            <form action="#" method="get">
            <fieldset>
                    <legend>Formularul meu</legend>
                    
                    <div class="form-rand">
                        <label for="nume">Numele tau:</label>
                        <br>
                        <input type="text" id="nume" name="nume" required>
                    </div>

                    <div class="form-rand">
                        <label for="email">Adresa de email:</label>
                        <br>
                        <input type="email" id="email" name="email" required>
                    </div>

                    <div class="form-rand">
                        <label for="motiv">De ce imi scrii:</label>
                        <br>
                        <select id="motiv" name="motiv">
                            <option value="tema">Ai o intrebare despre tema</option>
                            <option value="salut">Doar vrei sa ma saluti</option>
                            <option value="spam">Spam</option>
                        </select>
                    </div>

                    <div class="form-rand">
                        <label for="mesajul">Mesaj text:</label>
                        <br>
                        <textarea id="mesajul" name="mesajul" rows="4" required></textarea>
                    </div>

                    <button type="submit">Trimite Acum</button>
            </fieldset>
            </form>
        </section>
    </main>

    <footer>
        <p>Creat de student UVT - Anul 1. 2026.</p>
